# Aegis Configuration File

server:
  port: 3000

kernel:
  bpf_path: ./bpf/main.bpf.o
  ring_buffer_size: 262144

telemetry:
  process_tree_max_age: 30m
  process_tree_max_size: 10000
  process_tree_max_chain_length: 50
  recent_events_capacity: 10000
  event_index_size: 1000

policy:
  rules_path: ./rules.yaml
  promotion_min_observation_minutes: 1440
  promotion_min_hits: 100

analysis:
  mode: ollama
  ollama:
    endpoint: http://localhost:11434
    model: qwen2.5-coder:1.5b
    timeout: 60
  openai:
    endpoint: https://api.deepseek.com
    api_key: ""
    model: deepseek-chat
    timeout: 30

sentinel:
  testing_promotion: 15m
  anomaly: 5m
  rule_optimization: 1h
  daily_report: 24h
